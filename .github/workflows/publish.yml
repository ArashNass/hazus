# Builds the site (run.py). Deployment to this repo's own GitHub Pages is
# currently DISABLED — the built site is instead published manually from
# the arashnass.github.io hub repo. Auto-running this workflow on every push
# would fail at the deploy step since there's no Pages target here, so it's
# manual-only until/unless this repo's own Pages is re-enabled.

name: Build and publish

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build site
        run: python run.py
      - name: Stage site
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp HAZUS_Dashboard.html dist/HAZUS_Dashboard.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
