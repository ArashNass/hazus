# Builds the site (run.py) and uploads build artifacts only.
# This repo does not publish to its own GitHub Pages; the generated files are
# copied manually to the arashnass.github.io hub repo.

name: Build and publish

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build site
        run: python run.py
      - name: Stage site
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp HAZUS_Dashboard.html dist/HAZUS_Dashboard.html
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: hazus-dist
          path: dist
